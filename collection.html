<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Collection | V. PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37;
            --bg: #1a1a1a; 
            --text: #ffffff;
            --light-gray: rgba(255, 255, 255, 0.05);
            --overlay-bg: rgba(0, 0, 0, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        /* Initial Loading Screen */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .loader-logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; }
        .loader-bar { width: 150px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; display: block; width: 30px; height: 100%; background: var(--accent); position: absolute; left: -30px; animation: load 1s infinite linear; }
        @keyframes load { to { left: 150px; } }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); z-index: 100;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 1px; cursor: pointer; color: #fff; text-decoration: none;}
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-btn {
            text-decoration: none; color: #fff; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; transition: all 0.3s ease;
            cursor: pointer; background: transparent;
        }
        .nav-btn:hover { background-color: #fff; color: #000; border-color: #fff; transform: translateY(-2px); }

        /* Hero Section */
        .collection-hero { padding: 120px 10% 60px; text-align: center; max-width: 900px; margin: 0 auto; }
        .collection-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 20px; color: #fff; }
        .collection-hero p { font-style: italic; color: #aaa; font-size: 1.2rem; line-height: 1.6; border-left: 3px solid var(--accent); padding-left: 20px; display: inline-block; text-align: left; }

        /* Main Collection Grid */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px;
            padding: 0 5% 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .gallery-item {
            background: var(--light-gray);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
            opacity: 0; 
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(255,255,255,0.03);
            aspect-ratio: 1/1; 
        }

        .gallery-item:nth-child(3n) { aspect-ratio: 4/5; } 
        .gallery-item:nth-child(4n) { aspect-ratio: 5/4; } 

        .gallery-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.08);
        }

        /* Item Overlay */
        .gallery-item-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff; text-align: center; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0; z-index: 2; transition: opacity 0.3s;
        }
        .gallery-item:hover .gallery-item-info { opacity: 1; }

        /* Lightbox Overlay */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay-bg); z-index: 1000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); cursor: zoom-out;
            animation: fadeInLightbox 0.5s ease forwards;
        }
        #lightbox img, #lightbox video { max-width: 90%; max-height: 90%; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .close-lightbox { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #fff; cursor: pointer; z-index: 1010; }

        @keyframes fadeInLightbox { from { opacity: 0; } to { opacity: 1; } }

        footer { padding: 60px 5%; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; background: rgba(0,0,0,0.5); }
        .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 15px; display: block; color: #fff; }
        .footer-tag { font-size: 0.8rem; color: #777; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 800px) {
            .collection-hero { padding: 80px 5% 40px; }
            .collection-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .gallery-item:nth-child(n) { aspect-ratio: 1/1; } 
        }
    </style>
</head>
<body>

    <div id="loading">
        <span class="loader-logo">V. PREMIUM</span>
        <div class="loader-bar"></div>
        <p style="color: #444; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;">Establishing Connection</p>
    </div>

    <nav>
        <a href="index.html" class="logo">V. PREMIUM</a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Home</a>
            <a href="ourstory.html" class="nav-btn">Our Story</a>
        </div>
    </nav>

    <main id="collection-page">
        <section class="collection-hero">
            <h1>The Dudam Archive</h1>
            <p>"A curated sequence.<br>One hundred fifty-five proofs of perfection."</p>
        </section>

        <section class="collection-grid" id="galleryContainer">
        </section>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <div id="lightboxContent" onclick="event.stopPropagation()"></div>
    </div>

    <footer>
        <span class="footer-logo">V. PREMIUM</span>
        <p class="footer-tag">The Complete Dudam Archive | Exclusively Yours</p>
    </footer>

    <script>
        // --- 1. Define distinct asset configurations ---
        const totalImages = 153;
        const totalVideos = 2;
        const gallery = document.getElementById('galleryContainer');

        // Loop to generate Images (1 to 153)
        for (let i = 1; i <= totalImages; i++) {
            createMediaItem(`pic/dudam_${i}.jpg`, 'image', `archive [${i}]`);
        }

        // Loop to generate Videos (1 to 2)
        // Adjust the path format ('pic/video_1.mp4' or whatever matching file structure you use)
        for (let v = 1; v <= totalVideos; v++) {
            createMediaItem(`pic/video_${v}.mp4`, 'video', `motion [${v}]`);
        }

        // Reusable DOM factory method to handle layout items cleanly
        function createMediaItem(src, type, label) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.onclick = function() { openLightbox(src, type); };

            let mediaElement;
            if (type === 'video') {
                mediaElement = document.createElement('video');
                mediaElement.muted = true;
                mediaElement.autoplay = true;
                mediaElement.loop = true;
                mediaElement.playsInline = true;
            } else {
                mediaElement = document.createElement('img');
                mediaElement.loading = 'lazy'; 
            }
            
            mediaElement.src = src;
            mediaElement.alt = label;

            const info = document.createElement('div');
            info.className = 'gallery-item-info';
            info.innerText = `${label} // view`;

            item.appendChild(mediaElement);
            item.appendChild(info);
            gallery.appendChild(item);
        }

        // --- 2. Remove loading screen when DOM is ready ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 1000);
            
            // Re-bind items generated to intersection observer
            document.querySelectorAll('.gallery-item').forEach(item => {
                observer.observe(item);
            });
        });

        // --- 3. Scroll Animation (Intersection Observer) ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, { threshold: 0.1 });

        // --- 4. Lightbox logic supporting both image & video nodes ---
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightboxContent');

        function openLightbox(src, type) {
            lightboxContent.innerHTML = ''; // Flush previous preview
            
            let element;
            if (type === 'video') {
                element = document.createElement('video');
                element.controls = true;
                element.autoplay = true;
                element.style.maxWidth = '90vw';
                element.style.maxHeight = '90vh';
            } else {
                element = document.createElement('img');
            }
            
            element.src = src;
            lightboxContent.appendChild(element);
            
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxContent.innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.style.display === 'flex') { closeLightbox(); }
        });
    </script>
</body>
</html>
